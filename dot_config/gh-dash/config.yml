prSections:
- title: My Pull Requests
  filters: is:open author:@me
  type: null
- title: Needs My Review
  filters: is:open review-requested:@me
  type: null
- title: Involved
  filters: is:open involves:@me -author:@me
  type: null
- title: Is Open
  filters: is:open repo:TandaHQ/payaus
  type: null
- title: All
  filters: repo:TandaHQ/payaus
  type: null
issuesSections:
- title: My Issues
  filters: is:open author:@me
- title: Assigned
  filters: is:open assignee:@me
- title: Involved
  filters: is:open involves:@me -author:@me
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 80
    position: bottom
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 5
keybindings:
  universal: []
  issues: []
  prs:
    # Request myself as a reviewer on the selected PR so it shows up under
    # "Needs My Review" (review-requested:@me). Uses my literal login: gh only
    # expands "@me" for --add-assignee, not --add-reviewer. No-op-with-error on
    # my own PRs (GitHub blocks requesting review from the author).
    # Key "+" = "add a reviewer"; kept off the letter row to avoid the m=merge
    # neighbourhood. R/r (refresh) and m (merge) are taken by gh-dash.
    - key: "+"
      name: request-my-review
      command: gh pr edit {{.PrNumber}} --repo {{.RepoName}} --add-reviewer JaredSharplin
    # Edit the selected PR. gh has no flag to open $EDITOR prefilled with the
    # current body, so this runs `gh pr edit` with no field flags: gh drops into
    # its interactive field picker, and choosing "Body" opens $EDITOR with the
    # existing body loaded. The picker also covers title/labels/etc. gh-dash
    # suspends to the foreground for custom commands, so the editor takes over.
    - key: "E"
      name: edit-pr
      command: gh pr edit {{.PrNumber}} --repo {{.RepoName}}
    # Review the selected PR in snacks.nvim's diff reviewer (line-by-line, `a` to
    # comment). Passing repo means gh_diff fetches the diff via `gh pr diff --repo`
    # and comments via the API, so this needs no checkout and mutates nothing —
    # right for others' PRs. vim.schedule defers the call one tick so the
    # lazy-loaded picker exists. gh-dash suspends to the foreground, so nvim owns
    # the terminal and quitting returns here. Folded scalar keeps the quotes literal.
    # Key "n" = nvim; "N" is the heavier review+edit variant (lower/upper mirrors
    # gh-dash's own r/R, x/X). r/R are refresh, v/V/e/E/d are all built-in actions.
    - key: n
      name: review-in-nvim
      command: >-
        nvim -c 'lua vim.schedule(function()
        Snacks.picker.gh_diff({ pr = {{.PrNumber}}, repo = "{{.RepoName}}" })
        end)'
    # Review + edit: land in a worktree for the PR branch (reusing an existing one,
    # else a disposable ~/.cache/gh-dash-review checkout), then open the same
    # reviewer over the real files with LSP — for my own PRs where a fix means
    # editing and pushing. The wrapper handles worktree resolution and cleanup.
    - key: N
      name: review-edit-worktree
      command: gh-review-worktree {{.RepoName}} {{.PrNumber}} {{.HeadRefName}}
  branches: []
repoPaths:
  TandaHQ/*: ~/programming/*
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: "diffnav"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
